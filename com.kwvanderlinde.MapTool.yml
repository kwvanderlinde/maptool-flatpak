id: com.kwvanderlinde.MapTool
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: MapTool
modules:
  - name: MapTool
    buildsystem: simple
    build-commands:
      - mkdir ${FLATPAK_DEST}/bin
      - mkdir -p ${FLATPAK_DEST}/opt/maptool
      - unzip maptool.zip -d ${FLATPAK_DEST}/opt/maptool
      - ln -s ${FLATPAK_DEST}/opt/maptool/bin/MapTool ${FLATPAK_DEST}/bin/MapTool
      - install -D MapTool.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -D -m644 icon_256.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
      - install -D -m644 metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
    sources:
      - type: file
        dest-filename: maptool.zip
        url: https://github.com/RPTools/maptool/releases/download/1.17.0-rc.2/MapTool-1.17.0-rc.2-linux.zip
        sha256: 1c13e8cf90335206367f6c516ac5f0f042a1982ca19b59fbaa7f3521bb267ac9
      - type: file
        path: MapTool.desktop
      - type: file
        path: icon_256.png
      - type: file
        path: metainfo.xml
finish-args:
  # Required for --socket=x11
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  # - --filesystem=home/.maptool-rptools
  # Mostly we just needs access to home/.maptool-rpttools, except that libraries can be installed anywhere.
  - --filesystem=host
  - --device=dri
  - --share=network
