id: net.rptools.MapTool
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: MapTool
modules:
  - name: MapTool
    buildsystem: simple
    build-commands:
      - mkdir ${FLATPAK_DEST}/bin
      - bsdtar -Oxf maptool.deb 'data.tar.zst' | bsdtar -xf -
      - mv opt/ ${FLATPAK_DEST}/
      - ln -s ${FLATPAK_DEST}/opt/maptool/bin/MapTool ${FLATPAK_DEST}/bin/MapTool
    sources:
      - type: file
        dest-filename: maptool.deb
        url: https://github.com/RPTools/maptool/releases/download/1.15.2/maptool_1.15.2-amd64.deb
        sha256: 15eb22f640c91c4417ad09122ac1c607f20184939720404c273a269880724415
finish-args:
  - --socket=x11
  # - --filesystem=home/.maptool-rptools
  # Mostly we just needs access to home/.maptool-rpttools, except that libraries can be installed anywhere.
  - --filesystem=home
  - --share=network
